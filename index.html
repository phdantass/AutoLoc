<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>AutoFinder</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />

    <!-- ICONS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

    <!-- LEAFLET -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>

<body>

    <!-- SIDEBAR -->

    <aside class="sidebar">

        <div class="logo">
            <h1><span>Auto</span> Finder</h1>
            <p>Encontre serviços automotivos</p>
        </div>

        <!-- SEARCH -->

        <div class="search-box">

            <i class="fa-solid fa-magnifying-glass"></i>

            <input type="text" placeholder="Buscar serviços, peças ou oficina" />

            <button id="themeToggle">
                <i class="fa-solid fa-moon"></i>
            </button>

        </div>

        <!-- LOCATION -->

        <div class="location">
            <i class="fa-solid fa-location-dot"></i>
            Localização atual detectada
        </div>

        <!-- SERVICES -->

        <div class="section-title">
            Serviços
        </div>

        <div class="services-grid">

            <div class="service-card active">
                <div class="icon">
                    <i class="fa-solid fa-wrench"></i>
                </div>

                <span>Mecânicas</span>
            </div>

            <div class="service-card">
                <div class="icon">
                    <i class="fa-solid fa-box"></i>
                </div>

                <span>Peças</span>
            </div>

            <div class="service-card">
                <div class="icon">
                    <i class="fa-solid fa-car-side"></i>
                </div>

                <span>Locadoras</span>
            </div>

            <div class="service-card">
                <div class="icon">
                    <i class="fa-solid fa-gauge"></i>
                </div>

                <span>Pneus</span>
            </div>

            <div class="service-card">
                <div class="icon">
                    <i class="fa-solid fa-bolt"></i>
                </div>

                <span>Elétrica</span>
            </div>

            <div class="service-card">
                <div class="icon">
                    <i class="fa-solid fa-sparkles"></i>
                </div>

                <span>Funilaria</span>
            </div>

        </div>

        <!-- FILTERS -->

        <div class="section-title">
            Filtros
        </div>

        <div class="filters">

            <button class="filter active">
                <i class="fa-solid fa-location-dot"></i>
                Mais próximo
            </button>

            <button class="filter">
                <i class="fa-solid fa-dollar-sign"></i>
                Mais barato
            </button>

        </div>

    </aside>

    <!-- MAP -->

    <main class="map-area">

        <!-- MAPA -->
        <div id="map"></div>

        <!-- STATS -->

        <div class="stats">

            <div class="stat-card">

                <div class="stat-icon blue">
                    <i class="fa-solid fa-location-dot"></i>
                </div>

                <h2>6</h2>
                <p>Estabelecimentos</p>

            </div>

            <div class="stat-card">

                <div class="stat-icon orange">
                    <i class="fa-solid fa-star"></i>
                </div>

                <h2>4.7</h2>
                <p>Avaliação Média</p>

            </div>

            <div class="stat-card">

                <div class="stat-icon green">
                    <i class="fa-solid fa-clock"></i>
                </div>

                <h2>5</h2>
                <p>Abertos Agora</p>

            </div>

        </div>

        <!-- POWERED -->

        <div class="powered">
            Powered by <span>AutoFinder</span>
        </div>

    </main>

    <!-- LEAFLET -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <!-- SCRIPT -->
    <script src="script.js"></script>

</body>

</html>
